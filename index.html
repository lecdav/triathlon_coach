  :root { color-scheme: light; }

  .page-header h1 { font-size: 22px; margin: 0 0 4px; font-weight: 700; }

    padding: 4px 12px; font-size: 12px; font-weight: 600;
  }
  h2 { font-size: 16px; margin: 24px 0 12px; font-weight: 600; color: #333; border-bottom: 1px solid #e5e5e5; padding-bottom: 6px; }
  .sub { color: #666; font-size: 13px; margin-bottom: 16px; }
  .form-banner {
    padding: 16px 20px; border-radius: 12px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 16px;
    border: 1px solid;
  }
  .form-banner .emoji { font-size: 32px; }
  .form-banner .label { font-size: 18px; font-weight: 700; }
  .form-banner .guidance { font-size: 13px; color: #555; margin-top: 2px; }
  .form-banner .tsb { margin-left: auto; font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .green { background: #e8f5e9; border-color: #a5d6a7; color: #1b5e20; }
  .orange { background: #fff3e0; border-color: #ffcc80; color: #e65100; }
  .red { background: #ffebee; border-color: #ef9a9a; color: #b71c1c; }
  .grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-bottom: 8px;
  }
  .kpi {
    background: #fff; border: 1px solid #e5e5e5; border-radius: 10px;
    padding: 12px 14px;
  }
  .kpi .v { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .kpi .l { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi .h { font-size: 11px; color: #888; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border-radius: 10px; overflow: hidden; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #eee; vertical-align: top; }
  th { font-weight: 600; background: #fafafa; color: #333; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
  td.day { font-weight: 600; white-space: nowrap; }
  td.seance { white-space: nowrap; font-weight: 500; }
  td.contenu { color: #444; font-size: 12.5px; }
  td.intensite { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: #555; white-space: nowrap; }
  td.tss { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
  tr.total-row { background: #f5f5f5; font-weight: 700; }
  tr.total-row td { border-top: 2px solid #ccc; }
  tr.next-row { background: #fff8e1; }
  tr.next-row td.day::after { content: " ← demain"; color: #f57c00; font-weight: 500; font-size: 11px; }
  details.justifs { margin-top: 12px; }
  details.justifs summary { font-size: 13px; color: #555; font-weight: 600; cursor: pointer; }
  details.justifs ul { font-size: 12.5px; color: #555; line-height: 1.6; }
  .chip { display: inline-block; background: #eef; color: #336; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .loading, .error { padding: 40px; text-align: center; color: #888; }
  .error { color: #c62828; }
  .meta { font-size: 11px; color: #999; margin-top: 24px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
  details { margin-top: 12px; }
  summary { cursor: pointer; font-weight: 600; font-size: 13px; color: #555; }
  details ul { font-size: 12.5px; color: #555; }
  .stale-banner {
    background: #fff3e0; border: 1px solid #ffcc80; border-radius: 10px;
    padding: 10px 16px; font-size: 13px; color: #e65100; margin-bottom: 12px;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
    td.intensite, td.contenu { display: none; }
  }
</style>

<script>
const SPORT_INFO = {
  "Run":              ["🏃",   "CAP"],
  "VirtualRide":      ["🚴",   "Vélo HT"],
  "Ride":             ["🚴",   "Vélo"],
  "Swim":             ["🏊",   "Natation"],
  "Brick (Bike+Run)": ["🚴+🏃","Brick"],
  "Repos":            ["💤",   "Repos"],
};

function formatSeance(p) {
  const sport = p.sport || "";
  if (sport === "Repos") return "💤 Repos total";
  const [emoji, sportFr] = SPORT_INFO[sport] || ["", sport];
  const typeStr = (p.type || "").split("—")[0].trim().toLowerCase();
  if (!typeStr) return `${emoji} ${sportFr}`.trim();
  return `${emoji} ${sportFr} ${typeStr}`.trim();
}

function formatContenu(p) {
  const struct = p.structure || "—";
  const dur = p.duration_min || 0;
  if (dur > 0) return `(${dur}') ${struct}`;
  return struct;
}

function formatTotalDuration(totalMin) {
  if (totalMin <= 0) return "0h00";
  const rounded = Math.round(totalMin / 5) * 5;
  const h = Math.floor(rounded / 60);
  const m = rounded % 60;
  return `~${h}h${String(m).padStart(2, "0")}`;
}

function render(data) {
  const c = document.getElementById("content");
  const sub = document.getElementById("subtitle");
  const raceBadge = document.getElementById("race-badge");
  const staleNotice = document.getElementById("stale-notice");

  const today = data.today;
  const form = data.form;
  const m = data.metrics;
  const th = data.thresholds;
  const l7 = data.load_7d;
  const l28 = data.load_28d;
  const sp = data.session_profile;
  const plan = data.weekly_plan || [];
  const totals = data.weekly_plan_totals || null;

  sub.textContent = `Snapshot du ${today} — généré ${(data.generated_at || "").replace("T", " à ").slice(0, 19)}`;

  // Badge course
  if (data.race_name && data.weeks_to_race != null) {
    raceBadge.textContent = `🏁 ${data.race_name} — J-${data.weeks_to_race * 7}`;
  }

  // Alerte si snapshot > 36h
  if (data.generated_at) {
    const generated = new Date(data.generated_at);
    const now = new Date();
    const diffH = (now - generated) / 3600000;
    if (diffH > 36) {
      staleNotice.innerHTML = `<div class="stale-banner">⚠️ Snapshot de plus de ${Math.round(diffH)}h — vérifiez que la tâche planifiée <code>triathlon-daily-coach</code> tourne correctement.</div>`;
    }
  }

  let html = "";

  html += `<div class="form-banner ${form.color}">
    <div class="emoji">${form.emoji || "•"}</div>
    <div>
      <div class="label">${form.label}</div>
      <div class="guidance">${form.guidance}</div>
    </div>
    <div class="tsb">${m.tsb >= 0 ? "+" : ""}${m.tsb.toFixed(1)} <span style="font-size:12px;font-weight:400;color:#666">TSB</span></div>
  </div>`;

  html += `<h2>État de forme (PMC — Coggan)</h2><div class="grid">
    <div class="kpi"><div class="l">CTL · forme</div><div class="v">${m.ctl.toFixed(1)}</div><div class="h">charge chronique 42j</div></div>
    <div class="kpi"><div class="l">ATL · fatigue</div><div class="v">${m.atl.toFixed(1)}</div><div class="h">charge aigüe 7j</div></div>
    <div class="kpi"><div class="l">Ramp rate</div><div class="v">${m.ramp_rate >= 0 ? "+" : ""}${m.ramp_rate.toFixed(1)}</div><div class="h">CTL/sem · sain &lt;5</div></div>
    <div class="kpi"><div class="l">FC repos</div><div class="v">${m.resting_hr ?? "—"}</div><div class="h">réf ${th.resting_hr ?? 56} bpm</div></div>
    ${m.sleep_hours ? `<div class="kpi"><div class="l">Sommeil</div><div class="v">${m.sleep_hours.toFixed(1)} h</div><div class="h">${m.sleep_hours >= 7 ? "OK" : "sous cible 7h"}</div></div>` : ""}
  </div>`;

  if (m.hrv_status) {
    html += `<div style="font-size:13px;color:#555;margin-bottom:8px">📊 ${m.hrv_status}</div>`;
  }

  html += `<h2>Charge & contexte</h2><div class="grid">
    <div class="kpi"><div class="l">Phase</div><div class="v" style="font-size:14px">${data.phase}</div>${data.weeks_to_race != null ? `<div class="h">${data.race_name} dans ${data.weeks_to_race} sem.</div>` : ""}</div>
    <div class="kpi"><div class="l">Charge 7j</div><div class="v">${Math.round(l7.total_load)} TSS</div><div class="h">${Math.round(l7.total_minutes)} min</div></div>
    <div class="kpi"><div class="l">Charge moy / sem (28j)</div><div class="v">${Math.round(l28.total_load/4)} TSS</div><div class="h">${Math.round(l28.total_minutes/4)} min</div></div>
  </div>`;

  html += `<h2>Distribution réelle (28 derniers jours)</h2>
  <table><thead><tr><th>Discipline</th><th>Séances/sem</th><th>Durée moy</th><th>Distance moy</th><th>TSS moy</th></tr></thead><tbody>`;
  for (const [sport, p] of Object.entries(sp)) {
    html += `<tr><td>${sport}</td><td>${p.per_week}</td><td>${p.avg_minutes} min</td><td>${p.avg_distance_km} km</td><td>${p.avg_load}</td></tr>`;
  }
  html += `</tbody></table>`;

  html += `<h2>Plan de la semaine (J+1 → J+7) — polarisé 80/20</h2>
  <table><thead><tr><th>Jour</th><th>Séance</th><th>Contenu</th><th>Intensité</th><th>TSS</th></tr></thead><tbody>`;

  let totalMin = 0;
  let totalTss = 0;
  for (const p of plan) {
    const cls = p.rel_day === 1 ? "next-row" : "";
    const jour = `${p.weekday_fr || p.weekday} <span style="color:#888;font-weight:400">(J+${p.rel_day ?? "?"})</span>`;
    const seance = formatSeance(p);
    const contenu = formatContenu(p);
    const intensite = p.zones || "—";
    const tss = p.tss_estimate || 0;
    const tssStr = tss > 0 ? String(tss) : "—";
    html += `<tr class="${cls}">
      <td class="day">${jour}</td>
      <td class="seance">${seance}</td>
      <td class="contenu">${contenu}</td>
      <td class="intensite">${intensite}</td>
      <td class="tss">${tssStr}</td>
    </tr>`;
    totalMin += (p.duration_min || 0);
    totalTss += tss;
  }
  const totalDur = totals?.total_minutes_str || formatTotalDuration(totalMin);
  const totalTssDisplay = totals?.total_tss ?? totalTss;
  html += `<tr class="total-row">
    <td>Total semaine</td>
    <td>${totalDur}</td>
    <td></td>
    <td></td>
    <td class="tss">~${totalTssDisplay}</td>
  </tr>`;
  html += `</tbody></table>`;

  const justifs = plan.filter(p => p.rationale);
  if (justifs.length) {
    html += `<details class="justifs"><summary>Justifications par séance</summary><ul>`;
    for (const p of justifs) {
      html += `<li><b>${p.weekday_fr || p.weekday} (J+${p.rel_day ?? "?"}) — ${formatSeance(p)}</b> : ${p.rationale}</li>`;
    }
    html += `</ul></details>`;
  }

  html += `<h2>Zones de référence (Intervals.icu)</h2><div class="grid">
    <div class="kpi"><div class="l">FTP vélo</div><div class="v">${th.ftp_watts ?? "—"} W</div></div>
    <div class="kpi"><div class="l">Seuil CAP</div><div class="v" style="font-size:16px">${th.threshold_pace_run_str ?? "—"}</div></div>
    <div class="kpi"><div class="l">CSS natation</div><div class="v" style="font-size:16px">${th.threshold_pace_swim_str ?? "—"}</div></div>
    <div class="kpi"><div class="l">LTHR / FCmax</div><div class="v" style="font-size:16px">${th.lthr ?? "—"} / ${th.hr_max ?? "—"}</div><div class="h">bpm</div></div>
  </div>`;

  html += `<details><summary>Notes scientifiques</summary><ul>
    <li><b>80/20 polarisé</b> (Seiler 2010, Stöggl 2014) : majoritairement Z1-Z2 sous LT1, 15-20% en Z4-Z5 au-dessus de LT2, peu de Z3 hors blocs spécifiques.</li>
    <li><b>Sweet spot</b> (88-94% FTP) : meilleur ratio gain CTL/coût ATL pour amateur 6-10 h/sem.</li>
    <li><b>TSB</b> = forme prédictive ; pic course visé +5 à +20 (Coggan).</li>
    <li><b>Ramp rate</b> &gt; +5-7 CTL/sem associé à risque blessure accru (Gabbett 2016).</li>
    <li><b>TSS estimé</b> = (durée_h) × IF² × 100 (Coggan) ; IF inféré du libellé de séance (récup 0.50 → seuil 0.90).</li>
  </ul></details>`;

  html += `<div class="meta">Source : Intervals.icu · Snapshot embarqué statiquement · Régénéré chaque matin par la tâche planifiée <code>triathlon-daily-coach</code> via Cowork.</div>`;

  c.innerHTML = html;
}

(function() {
  try {
    const raw = document.getElementById("snapshot").textContent.trim();
    const snap = JSON.parse(raw);
    if (!snap || !snap.today) {
      document.getElementById("content").innerHTML =
        `<div class="error">⚠️ Snapshot vide ou absent. Le script <code>daily_coach.py</code> doit être exécuté pour populer le dashboard.</div>`;
      document.getElementById("subtitle").textContent = "Aucune donnée disponible";
      return;
    }
    render(snap);
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="error"><b>Erreur de rendu :</b> ${e.message || e}</div>`;
  }
})();
</script>
</body>
