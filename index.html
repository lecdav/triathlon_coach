<script>
const SPORT_INFO = {
  "Run":              ["🏃",   "CAP"],
  "VirtualRide":      ["🚴",   "Vélo HT"],
  "Ride":             ["🚴",   "Vélo"],
  "Swim":             ["🏊",   "Natation"],
  "Brick (Bike+Run)": ["🚴+🏃","Brick"],
  "Strength":         ["💪",   "Muscu"],
  "Repos":            ["💤",   "Repos"],
};

function formatSeance(p) {
  const sport = p.sport || "";
  if (sport === "Repos") return "💤 Repos total";
  const [emoji, sportFr] = SPORT_INFO[sport] || ["", sport];
  const typeStr = (p.type || "").split("—")[0].trim().toLowerCase();
  if (!typeStr) return `${emoji} ${sportFr}`.trim();
  return `${emoji} ${sportFr} ${typeStr}`.trim();
}

function formatContenu(p) {
  const struct = p.structure || "—";
  const dur = p.duration_min || 0;
  if (dur > 0) return `(${dur}') ${struct}`;
  return struct;
}

function formatTotalDuration(totalMin) {
  if (totalMin <= 0) return "0h00";
  const rounded = Math.round(totalMin / 5) * 5;
  const h = Math.floor(rounded / 60);
  const m = rounded % 60;
  return `~${h}h${String(m).padStart(2, "0")}`;
}

// ── Frise saisonnière ──────────────────────────────────────────────────────
function buildSeasonTimeline(data) {
  const raceDate = new Date("2026-08-30");
  const today = new Date(data.today);
  // Début de la frise : lundi 4 mai 2026
  const start = new Date("2026-05-04");

  const PHASES = [
    { label: "Base aérobie",      color: "#1565c0", weeks: 6  },
    { label: "Développement",     color: "#6a1b9a", weeks: 5  },
    { label: "Pic / spécifique",  color: "#e65100", weeks: 3  },
    { label: "Affûtage",          color: "#2e7d32", weeks: 2  },
    { label: "Course 🏁",         color: "#b71c1c", weeks: 1  },
  ];

  // TSS cibles — cycle 4+1 (4 sem. charge +8%/sem + 1 sem. récup 65% du pic + reprise à 85% du pic précédent)
  const TSS_TARGETS = {
    // Semaines passées (post-duathlon)
    "2026-05-04": 250, "2026-05-11": 270, "2026-05-18": 270,
    // Bloc 1 (4 sem)
    "2026-05-25": 270, "2026-06-01": 292, "2026-06-08": 315, "2026-06-15": 340,
    "2026-06-22": 220,  // RECUP 65% de 340
    // Bloc 2 (4 sem) — reprise à 85% de 340
    "2026-06-29": 290, "2026-07-06": 315, "2026-07-13": 340, "2026-07-20": 368,
    "2026-07-27": 240,  // RECUP 65% de 368
    // Bloc 3 (2 sem) — reprise à 85% de 368
    "2026-08-03": 315, "2026-08-10": 345,
    // Affûtage
    "2026-08-17": 245, "2026-08-24": 145,
  };

  // TSS réalisés (injectés par le script Python)
  const weeklyActual = data.season_weekly_tss || {};

  // Construire les semaines
  const weeks = [];
  let d = new Date(start);
  let phaseIdx = 0, phaseRemaining = PHASES[0].weeks;
  while (d <= raceDate) {
    const monday = new Date(d);
    const sunday = new Date(d); sunday.setDate(sunday.getDate() + 6);
    const isCurrent = today >= monday && today <= sunday;
    const isPast = sunday < today && !isCurrent;

    // Date ISO du lundi pour lookup
    const mondayISO = monday.toISOString().slice(0, 10);

    // TSS cible : depuis le profil ou fallback progressif
    const tss = TSS_TARGETS[mondayISO] || (200 + weeks.length * 10);

    // TSS réalisé (semaines passées + semaine en cours partielle)
    const actualTss = weeklyActual[mondayISO] || 0;

    // Taux de réalisation (semaines passées uniquement, hors semaine en cours)
    const ratio = (isPast && tss > 0) ? actualTss / tss : null;

    // Couleur de la barre réalisée selon taux
    let actualColor;
    if (ratio === null) actualColor = null;
    else if (ratio >= 0.90) actualColor = "#4caf50";   // vert : ≥90%
    else if (ratio >= 0.70) actualColor = "#ff9800";   // orange : 70-89%
    else actualColor = "#f44336";                       // rouge : <70%

    const label = `${monday.getDate()}/${monday.getMonth() + 1}`;
    const phase = PHASES[phaseIdx];
    weeks.push({ monday, mondayISO, sunday, isCurrent, isPast, tss, actualTss, ratio, actualColor, label, phase });

    phaseRemaining--;
    if (phaseRemaining === 0 && phaseIdx < PHASES.length - 1) {
      phaseIdx++;
      phaseRemaining = PHASES[phaseIdx].weeks;
    }
    d.setDate(d.getDate() + 7);
  }

  const maxTss = Math.max(...weeks.map(w => w.tss));
  const curPhase = weeks.find(w => w.isCurrent)?.phase || PHASES[0];
  const weeksLeft = data.weeks_to_race ?? weeks.filter(w => !w.isPast && !w.isCurrent).length;

  // Légende phases
  let phasesHtml = `<div class="season-phases">`;
  for (const ph of PHASES) {
    phasesHtml += `<span class="season-phase" style="background:${ph.color}22;color:${ph.color};border:1px solid ${ph.color}44">${ph.label}</span>`;
  }
  phasesHtml += `</div>`;

  // Légende réalisation
  const legendHtml = `
    <div class="season-legend">
      <span>Réalisation :</span>
      <span><span class="season-legend-dot" style="background:#4caf50"></span>≥ 90%</span>
      <span><span class="season-legend-dot" style="background:#ff9800"></span>70–89%</span>
      <span><span class="season-legend-dot" style="background:#f44336"></span>&lt; 70%</span>
      <span><span class="season-legend-dot" style="background:#334155"></span>À venir</span>
    </div>`;

  // Barres
  let barsHtml = `<div class="season-bars">`;
  for (const w of weeks) {
    const h = Math.round((w.tss / maxTss) * 100);
    const cls = w.isCurrent ? "current" : w.isPast ? "past" : "future";
    const arrow = w.isCurrent ? `<div class="season-bar-arrow">▼</div>` : `<div style="height:14px"></div>`;

    // Barre cible (fond discret)
    let barContent;
    if (w.isPast && w.ratio !== null) {
      // Semaine passée : barre cible + barre réalisée superposée
      const hActual = Math.round((Math.min(w.actualTss, w.tss * 1.2) / maxTss) * 100);
      const pct = Math.round(w.ratio * 100);
      const tooltip = `${w.label} — Cible: ${w.tss} TSS | Réalisé: ${w.actualTss} TSS (${pct}%)`;
      barContent = `
        <div class="season-bar-wrap" style="height:${h}px" title="${tooltip}">
          <div class="season-bar" style="height:${h}px;background:${w.phase.color}33;border-radius:3px 3px 0 0;position:absolute;bottom:0;left:0;width:100%"></div>
          <div class="season-bar-actual" style="height:${hActual}px;background:${w.actualColor};opacity:0.85"></div>
        </div>`;
    } else if (w.isCurrent && w.actualTss > 0) {
      // Semaine en cours : barre cible + réalisé partiel en blanc
      const hActual = Math.round((w.actualTss / maxTss) * 100);
      const tooltip = `${w.label} (en cours) — Cible: ${w.tss} TSS | Réalisé: ${w.actualTss} TSS`;
      barContent = `
        <div class="season-bar-wrap" style="height:${h}px" title="${tooltip}">
          <div class="season-bar" style="height:${h}px;background:${w.phase.color}cc;border-radius:3px 3px 0 0;position:absolute;bottom:0;left:0;width:100%;outline:2px solid #fff;outline-offset:1px"></div>
          <div class="season-bar-actual" style="height:${hActual}px;background:rgba(255,255,255,0.5)"></div>
        </div>`;
    } else {
      // Semaine future
      barContent = `<div class="season-bar" style="height:${h}px;background:${w.phase.color}55" title="${w.label} — Cible: ${w.tss} TSS"></div>`;
    }

    barsHtml += `
      <div class="season-bar-col ${cls}">
        ${arrow}
        ${barContent}
        <div class="season-bar-label">${w.label}</div>
      </div>`;
  }
  barsHtml += `</div>`;

  return `
    <h2>Plan de saison — ${data.race_name || "Course objectif"} · ${raceDate.toLocaleDateString("fr-FR", {day:"numeric",month:"long"})}</h2>
    <div class="season-wrap">
      ${phasesHtml}
      ${legendHtml}
      ${barsHtml}
    </div>
    <div style="font-size:12px;color:#6b7a90;margin-bottom:8px">
      📍 Phase actuelle : <strong style="color:${curPhase.color}">${curPhase.label}</strong> · ${weeksLeft} sem. avant la course
    </div>`;
}

// ── Plan théorique idéal (onglets sem. courante / suivante) ──────────────────

function renderIdealWeekTable(plan, totals) {
  // Plan théorique pur : pas de statuts réalisé/manqué, simple référence
  const tssTarget = totals.total_tss || plan.reduce((s, p) => s + (p.tss_estimate || 0), 0);

  function renderRow(p) {
    const sport = p.sport || "";
    const isRest = sport === "Repos";
    const jour = p.weekday_fr || p.weekday;
    const seanceHtml = formatSeance(p);
    const contenuHtml = isRest ? `<span style="color:#5a6a7e">—</span>` : formatContenu(p);
    const tss = p.tss_estimate || 0;
    return `<tr${isRest ? ' style="opacity:0.55"' : ''}>
      <td class="day">${jour}</td>
      <td class="seance">${seanceHtml}</td>
      <td class="contenu">${contenuHtml}</td>
      <td class="intensite">${p.zones || "—"}</td>
      <td class="tss">${tss > 0 ? tss : "—"}</td>
    </tr>`;
  }

  let rows = "";
  for (const p of plan) rows += renderRow(p);

  return `
    <div class="adapted-header">
      <span style="font-size:12px;color:#6b7a90">TSS cible semaine : <strong style="color:#e2e2e2">${tssTarget}</strong> · Durée totale : <strong style="color:#e2e2e2">${totals.total_minutes_str || "—"}</strong></span>
    </div>
    <table><thead><tr><th>Jour</th><th>Séance</th><th>Contenu</th><th>Intensité</th><th>TSS</th></tr></thead>
    <tbody>${rows}
    <tr class="total-row">
      <td>Total semaine</td>
      <td>${totals.total_minutes_str || "—"}</td>
      <td></td><td></td>
      <td class="tss">~${tssTarget}</td>
    </tr>
    </tbody></table>`;
}

function buildIdealPlan(data) {
  const curPlan = data.ideal_week_plan || [];
  const nxtPlan = data.next_week_plan || [];
  if (curPlan.length === 0) return "";

  const fmtRange = (m, s) => m && s
    ? `${new Date(m).toLocaleDateString("fr-FR",{day:"numeric",month:"short"})} – ${new Date(s).toLocaleDateString("fr-FR",{day:"numeric",month:"short"})}`
    : "";

  const curLabel = fmtRange(data.week_monday, data.week_sunday);
  const nxtLabel = fmtRange(data.next_week_monday, data.next_week_sunday);

  const curHtml = renderIdealWeekTable(curPlan, data.ideal_week_plan_totals || {});
  const nxtHtml = nxtPlan.length > 0
    ? renderIdealWeekTable(nxtPlan, data.next_week_plan_totals || {})
    : `<p style="color:#6b7a90;font-size:13px;padding:12px 0">Plan de la semaine prochaine non disponible.</p>`;

  return `
    <h2>Plan de la semaine — polarisé 80/20</h2>
    <div class="week-tabs" id="idealTabs">
      <button class="week-tab active" onclick="switchIdealTab(0)" id="itab0">Cette semaine<br><span class="tab-dates">${curLabel}</span></button>
      <button class="week-tab" onclick="switchIdealTab(1)" id="itab1">Semaine suivante<br><span class="tab-dates">${nxtLabel}</span></button>
    </div>
    <div id="itabPanel0" class="tab-panel">${curHtml}</div>
    <div id="itabPanel1" class="tab-panel" style="display:none">${nxtHtml}</div>`;
}

// ── Plan adaptatif (semaine en cours uniquement) ─────────────────────────────

function buildAdaptedPlan(data) {
  const plan = data.weekly_plan || [];
  const totals = data.weekly_plan_totals || {};
  if (plan.length === 0) return "";

  const STATUS_ICON = { done: "✅", today: "⏳", todo: "⬜", past_missed: "❌" };

  let tssDone = 0, tssProjected = 0;
  const tssTarget = totals.total_tss || plan.reduce((s, p) => s + (p.tss_estimate || 0), 0);

  for (const p of plan) {
    const status = p.status || "todo";
    const tss = p.tss_estimate || 0;
    if (status === "done") {
      const realTss = (p.actual_activities || []).reduce((s, a) => s + (a.tss || 0), 0);
      tssDone += realTss > 0 ? realTss : tss;
    } else if (status === "today" || status === "todo") {
      tssProjected += tss;
    }
  }
  const tssTotal = tssDone + tssProjected;
  const pctDone = tssTarget > 0 ? Math.min(100, Math.round(tssDone / tssTarget * 100)) : 0;
  const pctProj = tssTarget > 0 ? Math.min(100, Math.round(tssTotal / tssTarget * 100)) : 0;

  let badgeColor, badgeText;
  if (pctDone >= 95) { badgeColor = "#2e7d32"; badgeText = "🎯 Objectif atteint"; }
  else if (tssTotal > tssTarget * 1.1) { badgeColor = "#e65100"; badgeText = "⚡ Semaine chargée"; }
  else if (tssTotal < tssTarget * 0.75) { badgeColor = "#1565c0"; badgeText = "📉 Semaine légère"; }
  else { badgeColor = "#1b5e20"; badgeText = "✅ Sur les rails"; }

  const pastRows = plan.filter(p => p.status === "done" || p.status === "past_missed");
  const futureRows = plan.filter(p => p.status === "today" || p.status === "todo");

  function renderRow(p) {
    const status = p.status || "todo";
    const isDone = status === "done";
    const isMissed = status === "past_missed";
    const isToday = status === "today";
    const icon = STATUS_ICON[status] || "⬜";
    let cls = "";
    if (isToday) cls = "next-row";
    else if (isDone) cls = "done-row";
    else if (isMissed) cls = "missed-row";

    const jour = `${icon} ${p.weekday_fr || p.weekday}`;
    let seanceHtml, contenuHtml;

    if (isDone && p.actual_activities && p.actual_activities.length > 0) {
      const acts = p.actual_activities.map(a => {
        const sportInfo = (SPORT_INFO[a.type] || SPORT_INFO[a.sport] || ["", a.type || ""]);
        const [em, fr] = sportInfo;
        const parts = [];
        if (a.duration_min) parts.push(`${a.duration_min} min`);
        if (a.distance_km) parts.push(`${a.distance_km} km`);
        if (a.tss) parts.push(`TSS ${a.tss}`);
        return `<span style="color:#4caf50;font-weight:600">${em} ${a.name || fr}</span> — ${parts.join(" · ")}`;
      }).join("<br>");
      seanceHtml = `<span style="color:#6b7a90;font-size:12px">Prévu : ${formatSeance(p)}</span>`;
      contenuHtml = `<div style="font-size:12.5px">${acts}</div>`;
    } else if (isMissed) {
      seanceHtml = `<span style="color:#b71c1c;text-decoration:line-through">${formatSeance(p)}</span>`;
      contenuHtml = `<span style="color:#6b7a90;font-size:12px">Non réalisée</span>`;
    } else {
      seanceHtml = formatSeance(p);
      contenuHtml = formatContenu(p);
      if (p.adaptation) {
        contenuHtml += `<div style="font-size:11px;color:#e65100;margin-top:2px">${p.adaptation}</div>`;
      }
    }

    const tss = p.tss_estimate || 0;
    return `<tr class="${cls}">
      <td class="day">${jour}</td>
      <td class="seance">${seanceHtml}</td>
      <td class="contenu">${contenuHtml}</td>
      <td class="intensite">${p.zones || "—"}</td>
      <td class="tss">${tss > 0 ? tss : "—"}</td>
    </tr>`;
  }

  let rows = "";
  for (const p of pastRows) rows += renderRow(p);
  if (pastRows.length > 0 && futureRows.length > 0) {
    rows += `<tr><td colspan="5" style="padding:0"><hr class="adapted-sep"></td></tr>`;
  }
  for (const p of futureRows) rows += renderRow(p);

  const donMin = pastRows.reduce((s, p) => {
    if (p.status === "done") return s + (p.actual_activities || []).reduce((ss, a) => ss + (a.duration_min || 0), 0);
    return s;
  }, 0);
  const remMin = futureRows.reduce((s, p) => s + (p.duration_min || 0), 0);

  const weekLabel = data.week_monday && data.week_sunday
    ? ` <span style="color:#5a6a7e;font-weight:400;font-size:13px">${
        new Date(data.week_monday).toLocaleDateString("fr-FR",{day:"numeric",month:"short"})
      } – ${new Date(data.week_sunday).toLocaleDateString("fr-FR",{day:"numeric",month:"short"})}</span>`
    : "";

  return `
    <h2>Suivi adaptatif${weekLabel}</h2>
    <div class="adapted-header">
      <span class="adapted-badge" style="background:${badgeColor}22;color:${badgeColor};border:1px solid ${badgeColor}44">${badgeText}</span>
      <span style="font-size:12px;color:#6b7a90">TSS réalisé : <strong style="color:#e2e2e2">${Math.round(tssDone)}</strong> / projeté : <strong style="color:#7ab0e8">${Math.round(tssTotal)}</strong> / cible : <strong style="color:#e2e2e2">${tssTarget}</strong></span>
    </div>
    <div class="adapted-tss-bar">
      <div class="adapted-tss-track">
        <div class="adapted-tss-proj" style="width:${pctProj}%;background:#2196f344"></div>
        <div class="adapted-tss-done" style="width:${pctDone}%;background:#4caf50"></div>
      </div>
    </div>
    <table><thead><tr><th>Jour</th><th>Séance</th><th>Contenu / Réalisé</th><th>Intensité</th><th>TSS</th></tr></thead>
    <tbody>${rows}
    <tr class="total-row">
      <td colspan="2">Réalisé / Reste à faire</td>
      <td colspan="2" style="color:#6b7a90;font-size:12px">${donMin > 0 ? formatTotalDuration(donMin) + " fait" : "—"} · ${remMin > 0 ? formatTotalDuration(remMin) + " restant" : "—"}</td>
      <td class="tss">${Math.round(tssDone)} / ${Math.round(tssProjected)}</td>
    </tr>
    </tbody></table>`;
}

function switchTab(idx) {
  [0, 1].forEach(i => {
    const tab = document.getElementById("tab" + i);
    const panel = document.getElementById("tabPanel" + i);
    if (!tab || !panel) return;
    if (i === idx) { tab.classList.add("active"); panel.style.display = ""; }
    else { tab.classList.remove("active"); panel.style.display = "none"; }
  });
}

function switchIdealTab(idx) {
  [0, 1].forEach(i => {
    const tab = document.getElementById("itab" + i);
    const panel = document.getElementById("itabPanel" + i);
    if (!tab || !panel) return;
    if (i === idx) { tab.classList.add("active"); panel.style.display = ""; }
    else { tab.classList.remove("active"); panel.style.display = "none"; }
  });
}

function render(data) {
  const c = document.getElementById("content");
  const sub = document.getElementById("subtitle");

  const today = data.today;
  const form = data.form;
  const m = data.metrics;
  const th = data.thresholds;
  const l7 = data.load_7d;
  const l28 = data.load_28d;
  const sp = data.session_profile;
  // plan et totals utilisés uniquement par buildAdaptedPlan via data directement

  sub.textContent = `Snapshot du ${today} — généré ${(data.generated_at || "").replace("T", " à ").slice(0, 19)}`;

  let html = "";

  // 1. Frise saisonnière
  try { html += buildSeasonTimeline(data); } catch(e) { console.warn("Season timeline error:", e); }

  // 2. Plan théorique idéal (onglets sem. courante / suivante)
  try { html += buildIdealPlan(data); } catch(e) { console.warn("Ideal plan error:", e); }

  // 2b. Justifications (plan théorique)
  const idealPlan = data.ideal_week_plan || [];
  const justifs = idealPlan.filter(p => p.rationale);
  if (justifs.length) {
    html += `<details class="justifs"><summary>Justifications par séance</summary><ul>`;
    for (const p of justifs) {
      html += `<li><b>${p.weekday_fr || p.weekday} — ${formatSeance(p)}</b> : ${p.rationale}</li>`;
    }
    html += `</ul></details>`;
  }

  // 3. Suivi adaptatif (semaine en cours uniquement)
  try { html += buildAdaptedPlan(data); } catch(e) { console.warn("Adapted plan error:", e); }

  // Adaptations dynamiques (alertes)
  const adaptations = data.week_adaptations || [];
  if (adaptations.length > 0) {
    html += `<div style="background:#2a1f0e;border:1px solid #5c3e10;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:13px;color:#f0a050;">`;
    for (const a of adaptations) {
      html += `<div style="margin-bottom:4px">⚡ ${a}</div>`;
    }
    html += `</div>`;
  }

  html += `<div class="form-banner ${form.color}">
    <div class="emoji">${form.emoji || "•"}</div>
    <div>
      <div class="label">${form.label}</div>
      <div class="guidance">${form.guidance}</div>
    </div>
    <div class="tsb">${m.tsb >= 0 ? "+" : ""}${m.tsb.toFixed(1)} <span style="font-size:12px;font-weight:400;color:#666">TSB</span></div>
  </div>`;

  html += `<h2>Évolution PMC — 3 derniers mois</h2>
  <div class="pmc-legend">
    <span><i class="ctl"></i> CTL (forme)</span>
    <span><i class="atl"></i> ATL (fatigue)</span>
    <span><i class="tsb"></i> TSB (forme nette)</span>
  </div>
  <div class="pmc-chart-wrap"><canvas id="pmcChart"></canvas></div>`;

  html += `<h2>État de forme (PMC — Coggan)</h2><div class="grid">
    <div class="kpi"><div class="l">CTL · forme</div><div class="v">${m.ctl.toFixed(1)}</div><div class="h">charge chronique 42j</div></div>
    <div class="kpi"><div class="l">ATL · fatigue</div><div class="v">${m.atl.toFixed(1)}</div><div class="h">charge aigüe 7j</div></div>
    <div class="kpi"><div class="l">Ramp rate</div><div class="v">${m.ramp_rate >= 0 ? "+" : ""}${m.ramp_rate.toFixed(1)}</div><div class="h">CTL/sem · sain &lt;5</div></div>
    <div class="kpi"><div class="l">FC repos</div><div class="v">${m.resting_hr ?? "—"}</div><div class="h">réf ${th.resting_hr ?? 56} bpm</div></div>
    ${m.sleep_hours ? `<div class="kpi"><div class="l">Sommeil</div><div class="v">${m.sleep_hours.toFixed(1)} h</div><div class="h">${m.sleep_hours >= 7 ? "OK" : "sous cible 7h"}</div></div>` : ""}
  </div>`;

  if (m.hrv_status) {
    html += `<div style="font-size:13px;color:#6b7a90;margin-bottom:8px">📊 ${m.hrv_status}</div>`;
  }

  html += `<h2>Charge & contexte</h2><div class="grid">
    <div class="kpi"><div class="l">Phase</div><div class="v" style="font-size:14px">${data.phase}</div>${data.weeks_to_race != null ? `<div class="h">${data.race_name} dans ${data.weeks_to_race} sem.</div>` : ""}</div>
    <div class="kpi"><div class="l">Charge 7j</div><div class="v">${Math.round(l7.total_load)} TSS</div><div class="h">${Math.round(l7.total_minutes)} min</div></div>
    <div class="kpi"><div class="l">Charge moy / sem (28j)</div><div class="v">${Math.round(l28.total_load/4)} TSS</div><div class="h">${Math.round(l28.total_minutes/4)} min</div></div>
  </div>`;

  // --- Message coach ---
  if (data.coach_message) {
    // Convertit le markdown leger (**, \n\n) en HTML
    const coachHtml = data.coach_message
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n\n/g, "</p><p>")
      .replace(/\n/g, "<br>");
    html += `<h2>Message de ton coach</h2>
    <div class="coach-card"><p>${coachHtml}</p></div>`;
  }

  html += `<h2>Zones de référence</h2><div class="grid">
    <div class="kpi"><div class="l">FTP vélo</div><div class="v">${th.ftp_watts ?? "—"} W</div></div>
    <div class="kpi"><div class="l">Seuil CAP</div><div class="v" style="font-size:16px">${th.threshold_pace_run_str ?? "—"}</div></div>
    <div class="kpi"><div class="l">CSS natation</div><div class="v" style="font-size:16px">${th.threshold_pace_swim_str ?? "—"}</div></div>
    <div class="kpi"><div class="l">LTHR / FCmax</div><div class="v" style="font-size:16px">${th.lthr ?? "—"} / ${th.hr_max ?? "—"}</div><div class="h">bpm</div></div>
  </div>`;

  html += `<details><summary>Notes scientifiques</summary><ul>
    <li><b>80/20 polarisé</b> (Seiler 2010, Stöggl 2014) : majoritairement Z1-Z2 sous LT1, 15-20% en Z4-Z5 au-dessus de LT2, peu de Z3 hors blocs spécifiques.</li>
    <li><b>Sweet spot</b> (88-94% FTP) : meilleur ratio gain CTL/coût ATL pour amateur 6-10 h/sem.</li>
    <li><b>TSB</b> = forme prédictive ; pic course visé +5 à +20 (Coggan).</li>
    <li><b>Ramp rate</b> &gt; +5-7 CTL/sem associé à risque blessure accru (Gabbett 2016).</li>
    <li><b>TSS estimé</b> = (durée_h) × IF² × 100 (Coggan) ; IF inféré du libellé de séance (récup 0.50 → seuil 0.90).</li>
  </ul></details>`;

  html += `<div class="meta">Source : Intervals.icu · Snapshot embarqué dans cet artifact · Régénéré chaque matin par la tâche planifiée <code>triathlon-daily-coach</code>.</div>`;

  c.innerHTML = html;

  // --- Graphique PMC ---
  const pmc = data.pmc_history || [];
  if (pmc.length > 0 && typeof Chart !== "undefined") {
    const labels = pmc.map(d => d.date);
    const ctlData = pmc.map(d => d.ctl);
    const atlData = pmc.map(d => d.atl);
    const tsbData = pmc.map(d => d.tsb);
    const todayIdx = labels.indexOf(data.today);

    const todayAnnotation = todayIdx >= 0 ? {
      type: "line",
      xMin: todayIdx, xMax: todayIdx,
      borderColor: "rgba(0,0,0,0.25)", borderWidth: 1, borderDash: [4, 4],
    } : null;

    const zeroLine = {
      type: "line",
      yMin: 0, yMax: 0,
      borderColor: "rgba(76,175,80,0.3)", borderWidth: 1,
    };

    new Chart(document.getElementById("pmcChart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "CTL", data: ctlData, yAxisID: "yLeft",
            borderColor: "#2196f3", backgroundColor: "rgba(33,150,243,0.08)",
            borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, fill: false, tension: 0.3,
          },
          {
            label: "ATL", data: atlData, yAxisID: "yLeft",
            borderColor: "#f44336", backgroundColor: "rgba(244,67,54,0.06)",
            borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, fill: false, tension: 0.3,
          },
          {
            label: "TSB", data: tsbData, yAxisID: "yRight",
            borderColor: "#4caf50", backgroundColor: ctx => {
              const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 240);
              g.addColorStop(0, "rgba(76,175,80,0.18)");
              g.addColorStop(1, "rgba(76,175,80,0.0)");
              return g;
            },
            borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4,
            fill: "origin", tension: 0.3,
          },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.y;
                const sign = v >= 0 ? "+" : "";
                return ` ${ctx.dataset.label}: ${ctx.dataset.label === "TSB" ? sign : ""}${v !== null ? v.toFixed(1) : "—"}`;
              },
            },
          },
        },
        scales: {
          x: {
            ticks: {
              maxTicksLimit: 7,
              callback: (_, i) => {
                const d = labels[i];
                if (!d) return "";
                const dt = new Date(d);
                return dt.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
              },
              font: { size: 11 }, color: "#5a6a7e",
            },
            grid: { color: "rgba(255,255,255,0.04)" },
          },
          yLeft: {
            position: "left",
            title: { display: true, text: "CTL / ATL", font: { size: 11 }, color: "#5a6a7e" },
            ticks: { font: { size: 11 }, color: "#5a6a7e" },
            grid: { color: "rgba(255,255,255,0.04)" },
          },
          yRight: {
            position: "right",
            title: { display: true, text: "TSB", font: { size: 11 }, color: "#5a6a7e" },
            ticks: { font: { size: 11 }, color: "#5a6a7e" },
            grid: { drawOnChartArea: false },
          },
        },
      },
    });
  }
}

(function() {
  fetch("data/today.json")
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} — data/today.json introuvable`);
      return r.json();
    })
    .then(snap => render(snap))
    .catch(e => {
      document.getElementById("content").innerHTML =
        `<div class="error"><b>Impossible de charger les données :</b> ${e.message}<br><br>
        <span style="font-size:12px;color:#6b7a90">
        En local, lance un serveur avec :<br>
        <code>python3 -m http.server 8080</code><br>
        puis ouvre <a href="http://localhost:8080" style="color:#7ab0e8">http://localhost:8080</a>
        </span></div>`;
    });
})();
</script>
</body>
</html>
