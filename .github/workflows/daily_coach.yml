name: Coach Triathlon — Rapport quotidien

on:
  schedule:
    # Tous les jours à 5h30 heure de Paris (UTC+2 en été → 03:30 UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:
    # Permet de lancer manuellement depuis l'onglet Actions de GitHub

permissions:
  contents: write   # nécessaire pour git push (mise à jour index.html)

jobs:
  daily-coach:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Récupère le code du repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Configure Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Installe les dépendances
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Lance le script coach
      - name: Run daily_coach.py
        env:
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_coach.py

      # 5. Commit et pousse data/today.json uniquement
      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json --force
          # Ne commite que s'il y a des changements
          git diff --cached --quiet || git commit -m "chore: snapshot quotidien $(date -u '+%Y-%m-%d')"
          git push
